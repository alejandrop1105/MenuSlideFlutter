name: menu_slide_flutter_example
description: >-
  Standalone reference app showing how an external host product consumes
  menu_slide_flutter: a side menu driving the whole app's light/dark theme.
publish_to: 'none'
version: 0.0.1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.7.0'

dependencies:
  flutter:
    sdk: flutter

  menu_slide_flutter:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
